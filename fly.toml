# fly.toml app configuration file generated for wtd on 2024-01-29T21:14:23+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wtd'
primary_region = 'sin'

[experimental]
  cmd = ['entrypoint.sh']
  entrypoint = ['sh']

[build]

[[mounts]]
  source = 'wtd_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
